name: Bug Report
description: Report a broken calculation, layout issue, or unexpected behaviour
labels: ["bug"]
body:
  - type: input
    id: tool
    attributes:
      label: Which tool?
      description: Name of the tool or "Landing page" / "Guide"
      placeholder: e.g. "Adjusted-Wald CI Builder"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe what went wrong.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: Browser & device
      placeholder: e.g. "Chrome 120, MacBook Pro" or "Safari, iPhone 15"
    validations:
      required: false
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: Drag and drop a screenshot if it helps.
    validations:
      required: false
